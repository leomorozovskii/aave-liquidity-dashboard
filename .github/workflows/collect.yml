name: Collect Aave Liquidity Snapshots

on:
  schedule:
    # GitHub's minimum cron interval is 5 minutes. Actual scheduling can drift
    # 5–15 minutes during peak load — that's normal and acceptable for
    # liquidity tracking (Aave reserve rates only change with each block).
    - cron: '*/5 * * * *'
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # v5 actions run on Node.js 24 — silences the Sept-2026 Node-20 deprecation warning.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run collector
        run: node collect.js

      - name: Commit snapshot
        run: |
          git config user.name  "aave-liquidity-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
